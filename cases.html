    <script>
        // 全局变量
        let currentCategory = 'all';
        let currentSearchTerm = '';

        // 生成案例卡片
        function generateMaterialCards(materials) {
            const grid = document.getElementById('materialsGrid');
            grid.innerHTML = '';
            
            materials.forEach(material => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-shadow duration-300';
                
                // 为每个案例创建轮播图
                let carouselHtml = `
                    <div class="relative h-48">
                        <div class="case-carousel flex transition-transform duration-500 ease-in-out h-full">
                `;
                
                // 添加三张图片到轮播
                material.image_urls.forEach((imageUrl, index) => {
                    carouselHtml += `
                        <div class="flex-shrink-0 w-full h-full">
                            <img src="${imageUrl}" alt="${material.name}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105 cursor-pointer" onclick="openImageModal('${imageUrl}')">
                        </div>
                    `;
                });
                
                carouselHtml += `
                        </div>
                        <div class="absolute top-2 right-2 bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${material.category}</div>
                        <!-- 轮播控制按钮 -->
                        <button class="prev-btn absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full p-1 shadow-md z-10">
                            <i class="fas fa-chevron-left text-gray-800 text-sm"></i>
                        </button>
                        <button class="next-btn absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full p-1 shadow-md z-10">
                            <i class="fas fa-chevron-right text-gray-800 text-sm"></i>
                        </button>
                        <!-- 轮播指示器 -->
                        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex space-x-1 z-10">
                `;
                
                // 添加指示器
                material.image_urls.forEach((_, index) => {
                    carouselHtml += `
                        <button class="w-2 h-2 rounded-full transition-colors ${index === 0 ? 'bg-blue-600' : 'bg-white/50 hover:bg-white/80'}" data-index="${index}"></button>
                    `;
                });
                
                carouselHtml += `
                        </div>
                    </div>
                `;
                
                // 卡片内容
                card.innerHTML = `
                    ${carouselHtml}
                    <div class="p-4">
                        <h3 class="text-lg font-bold text-gray-900 mb-2">${material.name}</h3>
                        <p class="text-sm text-gray-600">${material.scenario}</p>
                    </div>
                `;
                
                grid.appendChild(card);
                
                // 初始化轮播功能
                initCaseCarousel(card, material.image_urls.length);
            });
        }

        // 初始化案例轮播
        function initCaseCarousel(card, imageCount) {
            const carousel = card.querySelector('.case-carousel');
            const prevBtn = card.querySelector('.prev-btn');
            const nextBtn = card.querySelector('.next-btn');
            const indicatorsContainer = card.querySelector('.relative.h-48 .absolute.bottom-2');
            const indicators = indicatorsContainer.querySelectorAll('button');
            let currentIndex = 0;
            
            // 确保轮播容器有正确的样式
            const carouselContainer = card.querySelector('.relative.h-48');
            carouselContainer.style.overflow = 'hidden';
            
            // 更新轮播位置
            function updateCarousel() {
                carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
                
                // 更新指示器状态
                indicators.forEach((indicator, index) => {
                    indicator.className = `w-2 h-2 rounded-full transition-colors ${index === currentIndex ? 'bg-blue-600' : 'bg-white/50 hover:bg-white/80'}`;
                });
            }
            
            // 上一张
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    currentIndex = (currentIndex - 1 + imageCount) % imageCount;
                    updateCarousel();
                });
            }
            
            // 下一张
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    currentIndex = (currentIndex + 1) % imageCount;
                    updateCarousel();
                });
            }
            
            // 指示器点击
            if (indicators.length > 0) {
                indicators.forEach((indicator, index) => {
                    indicator.addEventListener('click', () => {
                        currentIndex = index;
                        updateCarousel();
                    });
                });
            }
        }

        // 筛选物料
        function filterMaterials() {
            let filteredMaterials = materialsData.filter(material => {
                const matchesCategory = currentCategory === 'all' || material.category === currentCategory;
                const matchesSearch = material.name.toLowerCase().includes(currentSearchTerm);
                return matchesCategory && matchesSearch;
            });
            generateMaterialCards(filteredMaterials);
        }

        // 搜索物料
        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearchTerm = e.target.value.trim().toLowerCase();
            filterMaterials();
        });

        // 分类筛选
        document.querySelectorAll('.category-filter').forEach(button => {
            button.addEventListener('click', function() {
                // 更新按钮样式
                document.querySelectorAll('.category-filter').forEach(btn => {
                    btn.className = 'category-filter px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors';
                });
                this.className = 'category-filter px-4 py-2 rounded-full bg-blue-600 text-white hover:bg-blue-700 transition-colors';
                
                // 更新当前分类
                currentCategory = this.dataset.category;
                filterMaterials();
            });
        });

        // 打开图片模态框
        function openImageModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageUrl;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 防止背景滚动
        }

        // 关闭图片模态框
        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden');
            document.body.style.overflow = ''; // 恢复背景滚动
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            filterMaterials();
            
            // 关闭模态框事件
            document.getElementById('closeModal').addEventListener('click', closeImageModal);
            
            // 点击模态框背景关闭
            document.getElementById('imageModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeImageModal();
                }
            });
        });
    </script>
