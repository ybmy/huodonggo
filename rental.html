    <script>
        // 全局变量
        let currentCategory = 'all';
        let currentSearchTerm = '';

        // 生成物料卡片
        function generateMaterialCards(materials) {
            const grid = document.getElementById('materialsGrid');
            grid.innerHTML = '';
            
            materials.forEach(material => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-shadow duration-300';
                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden">
                        <img src="${material.image_url}" alt="${material.name}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105 cursor-pointer" onclick="openImageModal('${material.image_url}')">
                        <div class="absolute top-2 right-2 bg-blue-600 text-white text-xs px-2 py-1 rounded-full">${material.category}</div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-bold text-gray-900 mb-2">${material.name}</h3>
                        <p class="text-sm text-gray-600 mb-3 line-clamp-2">${material.scenario}</p>
                        
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 筛选物料
        function filterMaterials() {
            let filteredMaterials = materialsData.filter(material => {
                const matchesCategory = currentCategory === 'all' || material.category === currentCategory;
                const matchesSearch = material.name.toLowerCase().includes(currentSearchTerm);
                return matchesCategory && matchesSearch;
            });
            generateMaterialCards(filteredMaterials);
        }

        // 搜索物料
        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearchTerm = e.target.value.trim().toLowerCase();
            filterMaterials();
        });

        // 分类筛选
        document.querySelectorAll('.category-filter').forEach(button => {
            button.addEventListener('click', function() {
                // 更新按钮样式
                document.querySelectorAll('.category-filter').forEach(btn => {
                    btn.className = 'category-filter px-4 py-2 rounded-full bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors';
                });
                this.className = 'category-filter px-4 py-2 rounded-full bg-blue-600 text-white hover:bg-blue-700 transition-colors';
                
                // 更新当前分类
                currentCategory = this.dataset.category;
                filterMaterials();
            });
        });

        // 打开图片模态框
        function openImageModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageUrl;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 防止背景滚动
        }

        // 关闭图片模态框
        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden');
            document.body.style.overflow = ''; // 恢复背景滚动
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            filterMaterials();
            
            // 关闭模态框事件
            document.getElementById('closeModal').addEventListener('click', closeImageModal);
            
            // 点击模态框背景关闭
            document.getElementById('imageModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeImageModal();
                }
            });
        });
    </script>
